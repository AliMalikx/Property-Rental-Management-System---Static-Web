<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tenants — PRMS</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="page">

<header class="topbar">
  <div class="logo">🏠 PRMS <span>Manage Tenants</span></div>
  <div class="topbar-actions">
    <a href="dashboard.html" class="btn btn-ghost btn-sm">← Dashboard</a>
    <button class="btn btn-ghost btn-sm" id="logout-btn">Logout</button>
  </div>
</header>

<main class="main">
  <h1>Tenants</h1>
  <p class="subtitle">Register and manage tenant profiles.</p>

  <div class="tabs">
    <button class="tab-btn active" data-tab="tab-add">➕ Add Tenant</button>
    <button class="tab-btn" data-tab="tab-view">📋 View Tenants</button>
    <button class="tab-btn" data-tab="tab-edit">✏️ Edit Tenant</button>
    <button class="tab-btn" data-tab="tab-delete">🗑️ Delete Tenant</button>
  </div>

  <!-- ADD -->
  <div id="tab-add" class="tab-pane active">
    <div class="card">
      <h2>Add New Tenant</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>Tenant ID</label>
          <input type="text" id="add-ten-id" readonly/>
        </div>
        <div class="form-group">
          <label>Tenant Name</label>
          <input type="text" id="add-ten-name" placeholder="Full name"/>
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="text" id="add-ten-phone" placeholder="0300-XXXXXXX"/>
        </div>
        <div class="form-group">
          <label>CNIC</label>
          <input type="text" id="add-ten-cnic" placeholder="XXXXX-XXXXXXX-X"/>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="add-ten-email" placeholder="tenant@email.com"/>
        </div>
        <div class="form-group full">
          <label>Address</label>
          <input type="text" id="add-ten-address" placeholder="Full address"/>
        </div>
        <div class="form-actions">
          <button class="btn btn-primary" id="add-ten-btn">Add Tenant</button>
          <button class="btn btn-ghost" id="add-ten-reset">Reset</button>
        </div>
      </div>
    </div>
  </div>

  <!-- VIEW -->
  <div id="tab-view" class="tab-pane">
    <div class="section-header">
      <h2>All Tenants</h2>
      <span id="ten-count" style="font-size:0.85rem;color:var(--text-muted)"></span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Tenant ID</th><th>Name</th><th>Phone</th><th>CNIC</th><th>Email</th><th>Address</th></tr>
        </thead>
        <tbody id="ten-table-body"></tbody>
      </table>
    </div>
  </div>

  <!-- EDIT -->
  <div id="tab-edit" class="tab-pane">
    <div class="card">
      <h2>Edit Tenant</h2>
      <div class="form-group" style="margin-bottom:20px">
        <label>Select Tenant ID</label>
        <select id="edit-ten-select"></select>
      </div>
      <div class="form-grid" id="edit-ten-fields" style="display:none">
        <div class="form-group"><label>Name</label><input type="text" id="edit-ten-name"/></div>
        <div class="form-group"><label>Phone</label><input type="text" id="edit-ten-phone"/></div>
        <div class="form-group"><label>CNIC</label><input type="text" id="edit-ten-cnic"/></div>
        <div class="form-group"><label>Email</label><input type="email" id="edit-ten-email"/></div>
        <div class="form-group full"><label>Address</label><input type="text" id="edit-ten-address"/></div>
        <div class="form-actions"><button class="btn btn-primary" id="save-ten-btn">Save Changes</button></div>
      </div>
    </div>
  </div>

  <!-- DELETE -->
  <div id="tab-delete" class="tab-pane">
    <div class="card" style="max-width:480px">
      <h2>Delete Tenant</h2>
      <p style="color:var(--text-muted);font-size:0.88rem;margin-bottom:20px">Select a tenant to permanently remove.</p>
      <div class="form-group" style="margin-bottom:20px">
        <label>Select Tenant ID</label>
        <select id="del-ten-select"></select>
      </div>
      <div id="del-ten-preview" style="display:none;margin-bottom:20px;padding:14px;background:var(--surface2);border-radius:8px;font-size:0.88rem;color:var(--text-muted)"></div>
      <button class="btn btn-danger" id="del-ten-btn">Delete Tenant</button>
    </div>
  </div>
</main>

<script src="app.js"></script>
<script>
  requireAuth();

  function renderTable() {
    const tenants = DB.get('tenants') || [];
    document.getElementById('ten-count').textContent = tenants.length + ' record(s)';
    document.getElementById('ten-table-body').innerHTML = tenants.length
      ? tenants.map(t => `<tr>
          <td>${t.id}</td><td>${t.name}</td><td>${t.phone}</td>
          <td>${t.cnic}</td><td>${t.email}</td><td>${t.address}</td>
        </tr>`).join('')
      : '<tr><td colspan="6"><div class="empty-state"><div class="icon">🧑‍💼</div><p>No tenants added yet.</p></div></td></tr>';
  }

  function populateSelects() {
    const tenants = DB.get('tenants') || [];
    document.getElementById('add-ten-id').value = genId('TEN', tenants);
    const opts = tenants.map(t => `<option value="${t.id}">${t.id} — ${t.name}</option>`).join('');
    document.getElementById('edit-ten-select').innerHTML = '<option value="">-- Select --</option>' + opts;
    document.getElementById('del-ten-select').innerHTML  = '<option value="">-- Select --</option>' + opts;
  }

  initTabs();
  renderTable();
  populateSelects();

  // ADD
  document.getElementById('add-ten-btn').addEventListener('click', () => {
    const id      = document.getElementById('add-ten-id').value;
    const name    = document.getElementById('add-ten-name').value.trim();
    const phone   = document.getElementById('add-ten-phone').value.trim();
    const cnic    = document.getElementById('add-ten-cnic').value.trim();
    const email   = document.getElementById('add-ten-email').value.trim();
    const address = document.getElementById('add-ten-address').value.trim();
    if (!name || !phone || !cnic || !email || !address) { showToast('Fill all fields.', 'error'); return; }
    const tenants = DB.get('tenants') || [];
    tenants.push({ id, name, phone, cnic, email, address });
    DB.set('tenants', tenants);
    showToast('Tenant added!');
    ['add-ten-name','add-ten-phone','add-ten-cnic','add-ten-email','add-ten-address'].forEach(i => document.getElementById(i).value = '');
    renderTable(); populateSelects();
  });

  document.getElementById('add-ten-reset').addEventListener('click', () =>
    ['add-ten-name','add-ten-phone','add-ten-cnic','add-ten-email','add-ten-address'].forEach(i => document.getElementById(i).value = ''));

  // EDIT
  document.getElementById('edit-ten-select').addEventListener('change', function() {
    const id = this.value;
    const f = document.getElementById('edit-ten-fields');
    if (!id) { f.style.display = 'none'; return; }
    const t = (DB.get('tenants') || []).find(x => x.id === id);
    if (!t) return;
    ['name','phone','cnic','email','address'].forEach(k => document.getElementById('edit-ten-' + k).value = t[k]);
    f.style.display = 'grid';
  });

  document.getElementById('save-ten-btn').addEventListener('click', () => {
    const id = document.getElementById('edit-ten-select').value;
    const tenants = DB.get('tenants') || [];
    const idx = tenants.findIndex(x => x.id === id);
    if (idx < 0) return;
    ['name','phone','cnic','email','address'].forEach(k => tenants[idx][k] = document.getElementById('edit-ten-' + k).value.trim());
    DB.set('tenants', tenants);
    showToast('Tenant updated!');
    renderTable(); populateSelects();
    document.getElementById('edit-ten-fields').style.display = 'none';
    document.getElementById('edit-ten-select').value = '';
  });

  // DELETE
  document.getElementById('del-ten-select').addEventListener('change', function() {
    const t = (DB.get('tenants') || []).find(x => x.id === this.value);
    const preview = document.getElementById('del-ten-preview');
    if (!t) { preview.style.display = 'none'; return; }
    preview.innerHTML = `<b>${t.name}</b><br>Phone: ${t.phone} | CNIC: ${t.cnic}`;
    preview.style.display = 'block';
  });

  document.getElementById('del-ten-btn').addEventListener('click', () => {
    const id = document.getElementById('del-ten-select').value;
    if (!id) { showToast('Select a tenant.', 'error'); return; }
    confirmModal('Delete Tenant', `Delete tenant ${id}?`, () => {
      DB.set('tenants', (DB.get('tenants') || []).filter(x => x.id !== id));
      showToast('Tenant deleted.');
      renderTable(); populateSelects();
      document.getElementById('del-ten-preview').style.display = 'none';
    });
  });
</script>
</body>
</html>
