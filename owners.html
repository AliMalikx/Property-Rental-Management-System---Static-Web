<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Owners — PRMS</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="page">

<header class="topbar">
  <div class="logo">🏠 PRMS <span>Manage Owners</span></div>
  <div class="topbar-actions">
    <a href="dashboard.html" class="btn btn-ghost btn-sm">← Dashboard</a>
    <button class="btn btn-ghost btn-sm" id="logout-btn">Logout</button>
  </div>
</header>

<main class="main">
  <h1>Property Owners</h1>
  <p class="subtitle">Manage all property owner records.</p>

  <div class="tabs">
    <button class="tab-btn active" data-tab="tab-add">➕ Add Owner</button>
    <button class="tab-btn" data-tab="tab-view">📋 View Owners</button>
    <button class="tab-btn" data-tab="tab-edit">✏️ Edit Owner</button>
    <button class="tab-btn" data-tab="tab-delete">🗑️ Delete Owner</button>
  </div>

  <!-- ADD -->
  <div id="tab-add" class="tab-pane active">
    <div class="card">
      <h2>Add New Owner</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>Owner ID</label>
          <input type="text" id="add-own-id" readonly placeholder="Auto-generated"/>
        </div>
        <div class="form-group">
          <label>Owner Name</label>
          <input type="text" id="add-own-name" placeholder="Full name"/>
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="text" id="add-own-phone" placeholder="0300-1234567"/>
        </div>
        <div class="form-group">
          <label>CNIC</label>
          <input type="text" id="add-own-cnic" placeholder="XXXXX-XXXXXXX-X"/>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="add-own-email" placeholder="owner@email.com"/>
        </div>
        <div class="form-group full">
          <label>Address</label>
          <input type="text" id="add-own-address" placeholder="Full address"/>
        </div>
        <div class="form-actions">
          <button class="btn btn-primary" id="add-own-btn">Add Owner</button>
          <button class="btn btn-ghost" id="add-own-reset">Reset</button>
        </div>
      </div>
    </div>
  </div>

  <!-- VIEW -->
  <div id="tab-view" class="tab-pane">
    <div class="section-header">
      <h2>All Owners</h2>
      <span id="own-count" style="font-size:0.85rem;color:var(--text-muted)"></span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Owner ID</th><th>Name</th><th>Phone</th><th>CNIC</th><th>Email</th><th>Address</th></tr>
        </thead>
        <tbody id="own-table-body"></tbody>
      </table>
    </div>
  </div>

  <!-- EDIT -->
  <div id="tab-edit" class="tab-pane">
    <div class="card">
      <h2>Edit Owner</h2>
      <div class="form-group" style="margin-bottom:20px">
        <label>Select Owner ID</label>
        <select id="edit-own-select"></select>
      </div>
      <div class="form-grid" id="edit-own-fields" style="display:none">
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="edit-own-name"/>
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="text" id="edit-own-phone"/>
        </div>
        <div class="form-group">
          <label>CNIC</label>
          <input type="text" id="edit-own-cnic"/>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="edit-own-email"/>
        </div>
        <div class="form-group full">
          <label>Address</label>
          <input type="text" id="edit-own-address"/>
        </div>
        <div class="form-actions">
          <button class="btn btn-primary" id="save-own-btn">Save Changes</button>
        </div>
      </div>
    </div>
  </div>

  <!-- DELETE -->
  <div id="tab-delete" class="tab-pane">
    <div class="card" style="max-width:480px">
      <h2>Delete Owner</h2>
      <p style="color:var(--text-muted);font-size:0.88rem;margin-bottom:20px">Select an owner to permanently remove from the system.</p>
      <div class="form-group" style="margin-bottom:20px">
        <label>Select Owner ID</label>
        <select id="del-own-select"></select>
      </div>
      <div id="del-own-preview" style="display:none;margin-bottom:20px;padding:14px;background:var(--surface2);border-radius:8px;font-size:0.88rem;color:var(--text-muted)"></div>
      <button class="btn btn-danger" id="del-own-btn">Delete Owner</button>
    </div>
  </div>
</main>

<script src="app.js"></script>
<script>
  requireAuth();

  function renderTable() {
    const owners = DB.get('owners') || [];
    document.getElementById('own-count').textContent = owners.length + ' record(s)';
    document.getElementById('own-table-body').innerHTML = owners.length
      ? owners.map(o => `<tr>
          <td>${o.id}</td><td>${o.name}</td><td>${o.phone}</td>
          <td>${o.cnic}</td><td>${o.email}</td><td>${o.address}</td>
        </tr>`).join('')
      : '<tr><td colspan="6"><div class="empty-state"><div class="icon">👤</div><p>No owners added yet.</p></div></td></tr>';
  }

  function populateSelects() {
    const owners = DB.get('owners') || [];
    const opts = owners.map(o => `<option value="${o.id}">${o.id} — ${o.name}</option>`).join('');
    document.getElementById('edit-own-select').innerHTML = '<option value="">-- Select --</option>' + opts;
    document.getElementById('del-own-select').innerHTML  = '<option value="">-- Select --</option>' + opts;
    document.getElementById('add-own-id').value = genId('OWN', owners);
  }

  initTabs();
  renderTable();
  populateSelects();

  // ADD
  document.getElementById('add-own-btn').addEventListener('click', () => {
    const id      = document.getElementById('add-own-id').value;
    const name    = document.getElementById('add-own-name').value.trim();
    const phone   = document.getElementById('add-own-phone').value.trim();
    const cnic    = document.getElementById('add-own-cnic').value.trim();
    const email   = document.getElementById('add-own-email').value.trim();
    const address = document.getElementById('add-own-address').value.trim();
    if (!name || !phone || !cnic || !email || !address) { showToast('Fill all fields.', 'error'); return; }
    const owners = DB.get('owners') || [];
    owners.push({ id, name, phone, cnic, email, address });
    DB.set('owners', owners);
    showToast('Owner added!');
    ['add-own-name','add-own-phone','add-own-cnic','add-own-email','add-own-address'].forEach(i => document.getElementById(i).value = '');
    renderTable(); populateSelects();
  });

  document.getElementById('add-own-reset').addEventListener('click', () =>
    ['add-own-name','add-own-phone','add-own-cnic','add-own-email','add-own-address'].forEach(i => document.getElementById(i).value = ''));

  // EDIT
  document.getElementById('edit-own-select').addEventListener('change', function() {
    const id = this.value;
    const f = document.getElementById('edit-own-fields');
    if (!id) { f.style.display = 'none'; return; }
    const o = (DB.get('owners') || []).find(x => x.id === id);
    if (!o) return;
    document.getElementById('edit-own-name').value    = o.name;
    document.getElementById('edit-own-phone').value   = o.phone;
    document.getElementById('edit-own-cnic').value    = o.cnic;
    document.getElementById('edit-own-email').value   = o.email;
    document.getElementById('edit-own-address').value = o.address;
    f.style.display = 'grid';
  });

  document.getElementById('save-own-btn').addEventListener('click', () => {
    const id = document.getElementById('edit-own-select').value;
    const owners = DB.get('owners') || [];
    const idx = owners.findIndex(x => x.id === id);
    if (idx < 0) return;
    owners[idx] = { ...owners[idx],
      name:    document.getElementById('edit-own-name').value.trim(),
      phone:   document.getElementById('edit-own-phone').value.trim(),
      cnic:    document.getElementById('edit-own-cnic').value.trim(),
      email:   document.getElementById('edit-own-email').value.trim(),
      address: document.getElementById('edit-own-address').value.trim(),
    };
    DB.set('owners', owners);
    showToast('Owner updated!');
    renderTable(); populateSelects();
    document.getElementById('edit-own-fields').style.display = 'none';
    document.getElementById('edit-own-select').value = '';
  });

  // DELETE
  document.getElementById('del-own-select').addEventListener('change', function() {
    const id = this.value;
    const preview = document.getElementById('del-own-preview');
    if (!id) { preview.style.display = 'none'; return; }
    const o = (DB.get('owners') || []).find(x => x.id === id);
    if (!o) return;
    preview.innerHTML = `<b>${o.name}</b><br>Phone: ${o.phone} | CNIC: ${o.cnic}<br>Email: ${o.email}`;
    preview.style.display = 'block';
  });

  document.getElementById('del-own-btn').addEventListener('click', () => {
    const id = document.getElementById('del-own-select').value;
    if (!id) { showToast('Select an owner.', 'error'); return; }
    confirmModal('Delete Owner', `Delete owner ${id}? This cannot be undone.`, () => {
      DB.set('owners', (DB.get('owners') || []).filter(x => x.id !== id));
      showToast('Owner deleted.');
      renderTable(); populateSelects();
      document.getElementById('del-own-preview').style.display = 'none';
    });
  });
</script>
</body>
</html>
