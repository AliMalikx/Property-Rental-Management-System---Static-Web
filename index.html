<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Property Rental Management System</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="login-page">
  <div class="login-bg"></div>
  <div class="login-card">
    <div class="login-logo">🏠 PRMS</div>
    <div class="login-sub">Property Rental Management System</div>

    <div class="form-group" style="margin-bottom:16px">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter username" autocomplete="username"/>
    </div>
    <div class="form-group" style="margin-bottom:28px">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter password" autocomplete="current-password"/>
    </div>
    <button class="btn btn-primary" id="login-btn" style="width:100%;justify-content:center;padding:13px">
      Login to Dashboard
    </button>
    <p id="login-error" style="color:var(--red);font-size:0.85rem;margin-top:12px;display:none;text-align:center">
      Invalid username or password.
    </p>
    <!-- <p style="font-size:0.78rem;color:var(--text-faint);margin-top:28px;text-align:center">
      Default: admin / admin123
    </p> -->
  </div>
</div>

<script src="app.js"></script>
<script>
  if (AUTH.isLoggedIn()) window.location.href = 'dashboard.html';

  document.getElementById('login-btn').addEventListener('click', () => {
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value.trim();
    const err = document.getElementById('login-error');
    if (AUTH.login(u, p)) {
      AUTH.setLogin();
      window.location.href = 'dashboard.html';
    } else {
      err.style.display = 'block';
    }
  });

  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('login-btn').click();
  });
</script>
</body>
</html>
